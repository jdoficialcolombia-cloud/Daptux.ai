<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daptux QuoteFlow - Cotizador de Soluciones Digitales</title>
    <link rel="stylesheet" href="src/css/main.css">
    <style>
        .quoteflow-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .quote-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
            position: relative;
        }

        .quote-steps::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #e0e0e0;
            z-index: -1;
        }

        .step {
            flex: 1;
            text-align: center;
        }

        .step-number {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: #e0e0e0;
            border-radius: 50%;
            margin-bottom: 10px;
            font-weight: 700;
            color: #333;
        }

        .step.active .step-number {
            background-color: #0066ff;
            color: white;
        }

        .step.completed .step-number {
            background-color: #10b981;
            color: white;
        }

        .step-title {
            font-weight: 600;
            color: #666;
            font-size: 0.9rem;
        }

        .form-section {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-section h2 {
            color: #1a1a1a;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-item label {
            margin: 0;
            cursor: pointer;
            flex: 1;
        }

        .quote-summary {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            border-left: 4px solid #0066ff;
        }

        .quote-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .quote-item:last-child {
            border-bottom: none;
        }

        .quote-total {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-top: 2px solid #0066ff;
            font-weight: 700;
            color: #0066ff;
            font-size: 1.2rem;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: space-between;
            margin-top: 30px;
        }

        .button {
            flex: 1;
            padding: 12px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .button-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .button-secondary:hover {
            background-color: #d0d0d0;
        }

        .button-primary {
            background-color: #0066ff;
            color: white;
        }

        .button-primary:hover {
            background-color: #0052cc;
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3);
        }

        .button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .form-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header style="margin-bottom: 20px;">
        <nav>
            <div class="logo">🚀 Daptux - QuoteFlow</div>
            <div style="flex: 1;"></div>
            <button class="button button-secondary" onclick="window.close()">Cerrar</button>
        </nav>
    </header>

    <div class="quoteflow-container">
        <!-- Pasos -->
        <div class="quote-steps">
            <div class="step active" data-step="1">
                <div class="step-number">1</div>
                <div class="step-title">Cliente</div>
            </div>
            <div class="step" data-step="2">
                <div class="step-number">2</div>
                <div class="step-title">Tipo Solución</div>
            </div>
            <div class="step" data-step="3">
                <div class="step-number">3</div>
                <div class="step-title">Complejidad</div>
            </div>
            <div class="step" data-step="4">
                <div class="step-number">4</div>
                <div class="step-title">Resumen</div>
            </div>
        </div>

        <!-- PASO 1: DATOS DEL CLIENTE -->
        <div class="form-section active" data-step="1">
            <h2>Datos del Cliente</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre de la Empresa *</label>
                    <input type="text" id="companyName" required>
                </div>
                <div class="form-group">
                    <label>Sector *</label>
                    <select id="sector" required>
                        <option value="">Seleccionar...</option>
                        <option value="retail">Retail</option>
                        <option value="finanzas">Finanzas</option>
                        <option value="ganaderia">Ganadería</option>
                        <option value="hosteleria">Hostelería</option>
                        <option value="salud">Salud</option>
                        <option value="educacion">Educación</option>
                        <option value="inmobiliaria">Inmobiliaria</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre de Contacto *</label>
                    <input type="text" id="contactName" required>
                </div>
                <div class="form-group">
                    <label>Cargo</label>
                    <input type="text" id="position">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Correo *</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Teléfono</label>
                    <input type="tel" id="phone">
                </div>
            </div>
            <div class="form-group">
                <label>Cuidad</label>
                <input type="text" id="city">
            </div>
        </div>

        <!-- PASO 2: TIPO DE SOLUCIÓN -->
        <div class="form-section" data-step="2">
            <h2>Tipo de Solución</h2>
            <div class="form-group">
                <label>¿Qué tipo de proyecto necesitas? *</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" id="web" name="projectType" value="web">
                        <label for="web">Página Web Corporativa</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="landing" name="projectType" value="landing">
                        <label for="landing">Landing Page</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="ecommerce" name="projectType" value="ecommerce">
                        <label for="ecommerce">Tienda Virtual</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="software" name="projectType" value="software">
                        <label for="software">Software Personalizado</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="mvp" name="projectType" value="mvp">
                        <label for="mvp">MVP SaaS</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" id="app" name="projectType" value="app">
                        <label for="app">App Empresarial</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Describe el objetivo del proyecto *</label>
                <textarea id="objective" rows="4" required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Usuarios Aproximados *</label>
                    <input type="number" id="users" min="1" required>
                </div>
                <div class="form-group">
                    <label>Número de Sedes</label>
                    <input type="number" id="locations" min="1" value="1">
                </div>
            </div>
        </div>

        <!-- PASO 3: COMPLEJIDAD -->
        <div class="form-section" data-step="3">
            <h2>Nivel de Complejidad</h2>
            
            <div class="form-group">
                <label>Complejidad Funcional *</label>
                <select id="complexity" required onchange="updateQuote()">
                    <option value="">Seleccionar...</option>
                    <option value="simple">Simple (1-2 semanas) - $3,000</option>
                    <option value="intermedia">Intermedia (2-4 semanas) - $8,000</option>
                    <option value="compleja">Compleja (4-8 semanas) - $15,000</option>
                    <option value="muy-compleja">Muy Compleja (8+ semanas) - $25,000</option>
                </select>
            </div>

            <div class="form-group">
                <label>Funcionalidades Adicionales</label>
                <div class="checkbox-group">
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="integraciones" data-cost="2000" onchange="updateQuote()">
                        <label>Integraciones con APIs (+$2,000)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="ia" data-cost="5000" onchange="updateQuote()">
                        <label>Automatización con IA (+$5,000)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="seguridad" data-cost="3000" onchange="updateQuote()">
                        <label>Seguridad Avanzada (+$3,000)</label>
                    </div>
                    <div class="checkbox-item">
                        <input type="checkbox" name="features" value="soporte" data-cost="1000" onchange="updateQuote()">
                        <label>Soporte 24/7 (Mensual +$1,000)</label>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>Notas Adicionales</label>
                <textarea id="notes" rows="3"></textarea>
            </div>
        </div>

        <!-- PASO 4: RESUMEN -->
        <div class="form-section" data-step="4">
            <h2>Resumen de Cotización</h2>
            
            <div class="quote-summary">
                <h3 style="margin-bottom: 20px;">Detalles del Proyecto</h3>
                <div id="quoteSummaryContent">
                    <!-- Se llena dinámicamente -->
                </div>
            </div>

            <div class="form-group">
                <label>Información para Contacto</label>
                <div style="background: #f8f9fa; padding: 20px; border-radius: 8px;">
                    <p><strong>Empresa:</strong> <span id="summaryCompany">-</span></p>
                    <p><strong>Contacto:</strong> <span id="summaryContact">-</span></p>
                    <p><strong>Email:</strong> <span id="summaryEmail">-</span></p>
                </div>
            </div>
        </div>

        <!-- Botones de navegación -->
        <div class="button-group">
            <button class="button button-secondary" id="prevBtn" onclick="previousStep()" style="display:none;">← Anterior</button>
            <button class="button button-primary" id="nextBtn" onclick="nextStep()">Siguiente →</button>
            <button class="button button-primary" id="downloadBtn" onclick="downloadQuote()" style="display:none;">📥 Descargar PDF</button>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let quoteData = {
            basePrice: 0,
            additionalCosts: 0,
            total: 0
        };

        function updateStep(step) {
            currentStep = step;
            
            // Actualizar secciones de formulario
            document.querySelectorAll('.form-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelector(`[data-step="${step}"]`).classList.add('active');
            
            // Actualizar indicadores de paso
            document.querySelectorAll('.step').forEach((stepEl, index) => {
                stepEl.classList.remove('active', 'completed');
                if (index + 1 === step) {
                    stepEl.classList.add('active');
                } else if (index + 1 < step) {
                    stepEl.classList.add('completed');
                }
            });
            
            // Actualizar botones
            document.getElementById('prevBtn').style.display = step === 1 ? 'none' : 'block';
            document.getElementById('nextBtn').style.display = step === 4 ? 'none' : 'block';
            document.getElementById('downloadBtn').style.display = step === 4 ? 'block' : 'none';
            
            // Generar resumen si es el paso 4
            if (step === 4) {
                generateSummary();
            }
        }

        function nextStep() {
            // Validar paso actual
            if (!validateStep(currentStep)) {
                alert('Por favor completa los campos requeridos');
                return;
            }
            
            if (currentStep < 4) {
                updateStep(currentStep + 1);
            }
        }

        function previousStep() {
            if (currentStep > 1) {
                updateStep(currentStep - 1);
            }
        }

        function validateStep(step) {
            if (step === 1) {
                const required = ['companyName', 'sector', 'contactName', 'email'];
                return required.every(id => document.getElementById(id).value.trim());
            }
            if (step === 2) {
                const hasType = document.querySelectorAll('input[name="projectType"]:checked').length > 0;
                const hasObjective = document.getElementById('objective').value.trim();
                const hasUsers = document.getElementById('users').value;
                return hasType && hasObjective && hasUsers;
            }
            if (step === 3) {
                return document.getElementById('complexity').value;
            }
            return true;
        }

        function updateQuote() {
            const complexitySelect = document.getElementById('complexity');
            const selectedOption = complexitySelect.options[complexitySelect.selectedIndex];
            const complexityText = selectedOption.text;
            
            // Extraer precio del texto (ej: "Simple (1-2 semanas) - $3,000")
            const priceMatch = complexityText.match(/\$([0-9,]+)/);
            quoteData.basePrice = priceMatch ? parseInt(priceMatch[1].replace(',', '')) : 0;
            
            // Calcular costos adicionales
            quoteData.additionalCosts = 0;
            document.querySelectorAll('input[name="features"]:checked').forEach(feature => {
                quoteData.additionalCosts += parseInt(feature.getAttribute('data-cost'));
            });
            
            quoteData.total = quoteData.basePrice + quoteData.additionalCosts;
        }

        function generateSummary() {
            updateQuote();
            
            const projectTypes = Array.from(document.querySelectorAll('input[name="projectType"]:checked')).map(el => el.labels[0].textContent).join(', ');
            const features = Array.from(document.querySelectorAll('input[name="features"]:checked')).map(el => el.labels[0].textContent).join(', ');
            
            const summaryHTML = `
                <div class="quote-item">
                    <span>Tipos de Proyecto:</span>
                    <strong>${projectTypes}</strong>
                </div>
                <div class="quote-item">
                    <span>Usuarios Aproximados:</span>
                    <strong>${document.getElementById('users').value}</strong>
                </div>
                <div class="quote-item">
                    <span>Complejidad Base:</span>
                    <strong>$${quoteData.basePrice.toLocaleString()}</strong>
                </div>
                ${features ? `<div class="quote-item">
                    <span>Funcionalidades Adicionales:</span>
                    <strong>$${quoteData.additionalCosts.toLocaleString()}</strong>
                </div>` : ''}
                <div class="quote-total">
                    <span>TOTAL ESTIMADO:</span>
                    <span>$${quoteData.total.toLocaleString()}</span>
                </div>
            `;
            
            document.getElementById('quoteSummaryContent').innerHTML = summaryHTML;
            
            // Actualizar datos de contacto
            document.getElementById('summaryCompany').textContent = document.getElementById('companyName').value;
            document.getElementById('summaryContact').textContent = document.getElementById('contactName').value;
            document.getElementById('summaryEmail').textContent = document.getElementById('email').value;
        }

        function downloadQuote() {
            const data = {
                empresa: document.getElementById('companyName').value,
                contacto: document.getElementById('contactName').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('phone').value,
                ciudad: document.getElementById('city').value,
                sector: document.getElementById('sector').value,
                proyectos: Array.from(document.querySelectorAll('input[name="projectType"]:checked')).map(el => el.value).join(', '),
                objetivo: document.getElementById('objective').value,
                usuarios: document.getElementById('users').value,
                complejidad: document.getElementById('complexity').value,
                funcionalidades: Array.from(document.querySelectorAll('input[name="features"]:checked')).map(el => el.value).join(', '),
                notas: document.getElementById('notes').value,
                totalEstimado: quoteData.total,
                fechaGeneracion: new Date().toLocaleDateString('es-CO')
            };
            
            // Guardar en localStorage
            let quotes = JSON.parse(localStorage.getItem('daptux_quotes')) || [];
            quotes.push(data);
            localStorage.setItem('daptux_quotes', JSON.stringify(quotes));
            
            // Crear contenido para descarga (CSV)
            let csvContent = 'data:text/csv;charset=utf-8,';
            csvContent += Object.keys(data).map(key => key).join(',') + '\n';
            csvContent += Object.values(data).map(val => `"${val}"`).join(',');
            
            const link = document.createElement('a');
            link.href = encodeURI(csvContent);
            link.download = `cotizacion_${Date.now()}.csv`;
            link.click();
            
            alert('¡Cotización descargada correctamente!');
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', () => {
            updateStep(1);
        });
    </script>
</body>
</html>
